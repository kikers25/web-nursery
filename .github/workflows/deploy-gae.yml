name: Deploy to Google App Engine

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  JAVA_VERSION: '8'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Download compile-time dependencies
        run: |
          curl -sSL -o WEB-INF/lib/servlet-api-2.5.jar \
            "https://repo1.maven.org/maven2/javax/servlet/servlet-api/2.5/servlet-api-2.5.jar"

      - name: Compile Java sources
        run: |
          mkdir -p WEB-INF/classes
          javac -source 8 -target 8 \
            -cp "WEB-INF/lib/*" \
            -d WEB-INF/classes \
            -encoding UTF-8 \
            -Xlint:-options \
            -proc:none \
            $(find src -name "*.java")
          echo "Compiled $(find WEB-INF/classes -name '*.class' | wc -l) class files"

      - name: Prepare WAR directory
        run: |
          mkdir -p war/WEB-INF/classes
          cp -r WEB-INF/classes/com war/WEB-INF/classes/
          # Copy runtime JARs not already in war/WEB-INF/lib/
          for jar in log4j-1.2.17.jar commons-dbutils-1.6.jar ojdbc8-19.3.0.0.jar; do
            if [ -f "WEB-INF/lib/$jar" ] && [ ! -f "war/WEB-INF/lib/$jar" ]; then
              cp "WEB-INF/lib/$jar" war/WEB-INF/lib/
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to App Engine
        run: |
          gcloud app deploy war/ --quiet --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Show deployed URL
        run: |
          echo "Deployed to: https://${{ secrets.GCP_PROJECT_ID }}.appspot.com"
